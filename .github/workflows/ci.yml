name: CI

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]  # PR 创建、更新、重新打开时触发
  push:
    branches:
      - main  # 只有 push 到 main 分支才触发（包括 merge）

jobs:
  build:
    runs-on: ubuntu-latest
    # 只有指定仓库才触发
    if: github.repository == 'Keco-Studio/keco-studio'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        # GitHub 会自动使用 merge commit 来测试 PR，模拟 merge 后的状态
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci --ignore-scripts

      - name: 安装 Supabase CLI
        run: |
          # 使用官方推荐的 Linux 二进制安装方式
          curl -fsSL https://github.com/supabase/cli/releases/download/v1.227.0/supabase_linux_amd64.tar.gz -o supabase.tar.gz
          tar -xzf supabase.tar.gz
          mv supabase /usr/local/bin/

      - name: 启动 Supabase 本地服务
        run: |
          # 启动 Supabase 服务（后台运行）
          supabase start --no-backup
          # 等待服务就绪（最多等待 60 秒）
          echo "等待 Supabase 服务启动..."
          for i in {1..60}; do
            if curl -s http://127.0.0.1:54321/rest/v1/ > /dev/null 2>&1; then
              echo "Supabase 服务已就绪"
              break
            fi
            echo "等待中... ($i/60)"
            sleep 1
          done
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 重置数据库
        run: |
          # 使用 --no-seed 先重置，避免种子数据问题
          supabase db reset --no-seed
          # 单独执行种子脚本
          supabase db seed
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # 增加超时时间（默认 1 小时）
        timeout-minutes: 90

      - name: 构建项目
        env:
          # 从 GitHub Secrets 读取 Supabase 环境变量
          # 这些变量在构建时是必需的，因为代码在模块加载时就会检查
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # SUPABASE_SERVICE_ROLE_KEY 在某些 API 路由中可能需要
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run build

      - name: 停止 Supabase 服务
        if: always()
        run: supabase stop
        continue-on-error: true

      - name: 构建成功 ✅
        run: echo "构建检查通过！可以安全合并到 main"
