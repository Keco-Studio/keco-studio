name: Deploy to Vercel

on:
  push:
    branches:
      - main      
      - master
      - 'release/**'
  pull_request:
    branches:
      - main
      - master
      - 'release/**'
    types: [opened, synchronize, reopened]  

jobs:
 
  check-migrations:
    runs-on: ubuntu-latest
    name: Check for Migration Changes
    if: github.repository == 'Keco-Studio/keco-studio' || github.repository == 'xzy1124/keco-studio'
    outputs:
      has-migrations: ${{ steps.check.outputs.has-migrations }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以便比较分支

      - name: Check for migration changes
        id: check
        run: |
          echo "🔍 开始检查迁移文件..."
          echo "当前分支: ${{ github.ref }}"
          echo "当前 commit: ${{ github.sha }}"
          
          # 列出所有迁移文件（用于调试）
          echo "📋 当前分支的迁移文件："
          if [ -d "supabase/migrations" ]; then
            ls -la supabase/migrations/*.sql 2>/dev/null || echo "  没有找到 .sql 文件"
          else
            echo "  supabase/migrations 目录不存在"
          fi
          
          # 确定 base 分支
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            BASE_BRANCH="origin/main"
            # 如果 main 不存在，尝试 master
            if ! git rev-parse --verify "$BASE_BRANCH" >/dev/null 2>&1; then
              BASE_BRANCH="origin/master"
            fi
          elif [[ "${{ github.ref }}" =~ ^refs/heads/release ]]; then
            # release 分支与 main 比较
            BASE_BRANCH="origin/main"
            if ! git rev-parse --verify "$BASE_BRANCH" >/dev/null 2>&1; then
              BASE_BRANCH="origin/master"
            fi
          else
            # PR 或其他情况，与 main 比较
            BASE_BRANCH="origin/main"
            if ! git rev-parse --verify "$BASE_BRANCH" >/dev/null 2>&1; then
              BASE_BRANCH="origin/master"
            fi
          fi
          
          echo "Base 分支: $BASE_BRANCH"
          
          # 检查当前分支相对于 base 分支的迁移文件变化
          # 如果 base 分支不存在（首次推送），检查是否有迁移文件
          if ! git rev-parse --verify "$BASE_BRANCH" >/dev/null 2>&1; then
            echo "⚠️ Base 分支不存在，检查是否有迁移文件..."
            if [ -d "supabase/migrations" ] && [ "$(ls -A supabase/migrations/*.sql 2>/dev/null)" ]; then
              echo "has-migrations=true" >> $GITHUB_OUTPUT
              echo "✅ 检测到迁移文件（首次推送）"
            else
              echo "has-migrations=false" >> $GITHUB_OUTPUT
              echo "ℹ️ 没有迁移文件"
            fi
          else
            # 获取 base 分支的 commit
            git fetch origin ${BASE_BRANCH#origin/}:${BASE_BRANCH#origin/} 2>/dev/null || true
            
            # 比较当前分支与 base 分支的差异
            MIGRATION_FILES=$(git diff --name-only "$BASE_BRANCH" HEAD | grep "^supabase/migrations/" || true)
            
            if [ -n "$MIGRATION_FILES" ]; then
              echo "has-migrations=true" >> $GITHUB_OUTPUT
              echo "✅ 检测到迁移文件变化（相对于 $BASE_BRANCH）"
              echo "变化的迁移文件："
              echo "$MIGRATION_FILES" | while read -r file; do
                echo "  - $file"
              done
            else
              # 即使没有文件变化，也检查是否有迁移文件存在
              # 因为可能之前的迁移没有成功应用
              if [ -d "supabase/migrations" ] && [ "$(ls -A supabase/migrations/*.sql 2>/dev/null)" ]; then
                echo "has-migrations=true" >> $GITHUB_OUTPUT
                echo "✅ 检测到迁移文件（虽然没有变化，但可能存在未应用的迁移）"
              else
                echo "has-migrations=false" >> $GITHUB_OUTPUT
                echo "ℹ️ 没有迁移文件变化（相对于 $BASE_BRANCH）"
              fi
            fi
          fi

  
  migrate-database:
    runs-on: ubuntu-latest
    name: Run Supabase Migrations
    needs: check-migrations
    # 对于 main 和 release 分支，总是运行迁移（supabase db push 是幂等的，只会应用未应用的迁移）
    # 这样可以确保即使之前的迁移失败，也能重新应用
    if: |
      (github.repository == 'Keco-Studio/keco-studio' || github.repository == 'xzy1124/keco-studio') && (
        needs.check-migrations.outputs.has-migrations == 'true' ||
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master' ||
        startsWith(github.ref, 'refs/heads/release/')
      )
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check migration files exist
        run: |
          if [ ! -d "supabase/migrations" ] || [ -z "$(ls -A supabase/migrations/*.sql 2>/dev/null)" ]; then
            echo "⚠️ 没有找到迁移文件，跳过迁移任务"
            exit 0
          else
            echo "✅ 找到迁移文件，继续执行迁移"
            ls -la supabase/migrations/*.sql
          fi

      # 根据分支选择 Supabase 项目和对应的 Access Token
      # main 分支 → Production, release 分支 → Preview
      - name: Select Supabase Project and Token
        id: select-project
        env:
          PROD_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN_PROD }}
          PREVIEW_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN_PREVIEW }}
          GENERAL_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            # main 分支使用 Production 环境
            echo "project-ref=${{ secrets.SUPABASE_PROJECT_REF_PROD }}" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
            # 如果配置了单独的 Production Token，使用它；否则使用通用的 Token
            if [ -n "$PROD_TOKEN" ] && [ "$PROD_TOKEN" != "" ]; then
              echo "access-token=$PROD_TOKEN" >> $GITHUB_OUTPUT
              echo "✅ 使用 Production Supabase 项目 (单独 Token)"
            else
              echo "access-token=$GENERAL_TOKEN" >> $GITHUB_OUTPUT
              echo "✅ 使用 Production Supabase 项目 (通用 Token)"
            fi
          elif [[ "${{ github.ref }}" =~ ^refs/heads/release ]]; then
            # release 分支（包括 release/**）使用 Preview 环境
            echo "project-ref=${{ secrets.SUPABASE_PROJECT_REF_PREVIEW }}" >> $GITHUB_OUTPUT
            echo "environment=preview" >> $GITHUB_OUTPUT
            # 如果配置了单独的 Preview Token，使用它；否则使用通用的 Token
            if [ -n "$PREVIEW_TOKEN" ] && [ "$PREVIEW_TOKEN" != "" ]; then
              echo "access-token=$PREVIEW_TOKEN" >> $GITHUB_OUTPUT
              echo "✅ 使用 Preview Supabase 项目 (release 分支, 单独 Token)"
            else
              echo "access-token=$GENERAL_TOKEN" >> $GITHUB_OUTPUT
              echo "✅ 使用 Preview Supabase 项目 (release 分支, 通用 Token)"
            fi
          else
            # 其他情况（PR 等）使用 Preview 环境
            echo "project-ref=${{ secrets.SUPABASE_PROJECT_REF_PREVIEW }}" >> $GITHUB_OUTPUT
            echo "environment=preview" >> $GITHUB_OUTPUT
            if [ -n "$PREVIEW_TOKEN" ] && [ "$PREVIEW_TOKEN" != "" ]; then
              echo "access-token=$PREVIEW_TOKEN" >> $GITHUB_OUTPUT
              echo "✅ 使用 Preview Supabase 项目 (单独 Token)"
            else
              echo "access-token=$GENERAL_TOKEN" >> $GITHUB_OUTPUT
              echo "✅ 使用 Preview Supabase 项目 (通用 Token)"
            fi
          fi

      - name: Link to Supabase project
        run: |
          echo "🔗 链接到 Supabase 项目: ${{ steps.select-project.outputs.environment }}"
          echo "📋 Project Ref: ${{ steps.select-project.outputs.project-ref }}"
          supabase link --project-ref ${{ steps.select-project.outputs.project-ref }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ steps.select-project.outputs.access-token }}

      - name: Push database migrations
        run: |
          echo "🚀 开始推送数据库迁移到 ${{ steps.select-project.outputs.environment }} 环境..."
          supabase db push --include-all
          echo "✅ 迁移完成"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ steps.select-project.outputs.access-token }}
        continue-on-error: false  


  deploy:
    runs-on: ubuntu-latest
    needs: [check-migrations, migrate-database]  
    if: (github.repository == 'Keco-Studio/keco-studio' || github.repository == 'xzy1124/keco-studio') && always() && (needs.migrate-database.result == 'success' || needs.migrate-database.result == 'skipped')
    name: Deploy to Vercel
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run linter
        run: npm run lint
        continue-on-error: true  

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Determine deployment environment based on branch
      # main 分支 → Production, release 分支 → Preview
      - name: Determine deployment environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "is_prod=true" >> $GITHUB_OUTPUT
            echo "deployment_target=production" >> $GITHUB_OUTPUT
            echo "✅ 部署到 Production 环境 (main 分支)"
          elif [[ "${{ github.ref }}" =~ ^refs/heads/release ]]; then
            # release 分支（包括 release/**）部署到 Preview 环境
            echo "environment=preview" >> $GITHUB_OUTPUT
            echo "is_prod=false" >> $GITHUB_OUTPUT
            echo "deployment_target=preview" >> $GITHUB_OUTPUT
            echo "✅ 部署到 Preview 环境 (release 分支)"
          else
            # PR 等其他情况部署到 Preview
            echo "environment=preview" >> $GITHUB_OUTPUT
            echo "is_prod=false" >> $GITHUB_OUTPUT
            echo "deployment_target=preview" >> $GITHUB_OUTPUT
            echo "✅ 部署到 Preview 环境"
          fi

      # Pull Vercel environment variables based on deployment environment
      # This will automatically use the correct Supabase config (Production or Preview)
      # from Vercel Dashboard based on the environment determined above
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=${{ steps.env.outputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: |
          if [[ "${{ steps.env.outputs.is_prod }}" == "true" ]]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel
        run: |
          if [[ "${{ steps.env.outputs.is_prod }}" == "true" ]]; then
            # Production 部署（main 分支）
            echo "🚀 部署到 Production 环境..."
            vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
          elif [[ "${{ github.ref }}" =~ ^refs/heads/release/ ]]; then
            # Release 分支部署到 Preview 环境，可通过 Secret 自定义固定域名
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            echo "🚀 部署到 Preview 环境 (Branch: $BRANCH_NAME)..."
            DEPLOYMENT_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
            echo "📦 部署 URL: $DEPLOYMENT_URL"
            if [ -n "${{ secrets.VERCEL_PREVIEW_ALIAS_DOMAIN }}" ]; then
              echo "🔗 设置别名 ${{ secrets.VERCEL_PREVIEW_ALIAS_DOMAIN }}..."
              vercel alias set "$DEPLOYMENT_URL" "${{ secrets.VERCEL_PREVIEW_ALIAS_DOMAIN }}" --token=${{ secrets.VERCEL_TOKEN }}
            else
              echo "ℹ️ 未配置 VERCEL_PREVIEW_ALIAS_DOMAIN，跳过固定域名 alias"
            fi
            echo "✅ Release 部署完成，Branch: $BRANCH_NAME"
            if [ -n "${{ secrets.VERCEL_PREVIEW_ALIAS_DOMAIN }}" ]; then
              echo "🌐 Release URL: https://${{ secrets.VERCEL_PREVIEW_ALIAS_DOMAIN }}"
            fi
          else
            # 其他 Preview 部署（PR 等）
            echo "🚀 部署到 Preview 环境..."
            vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          